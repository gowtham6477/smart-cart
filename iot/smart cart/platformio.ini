; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:upesy_wroom]
platform = espressif32
board = upesy_wroom
framework = arduino
upload_port = COM5
upload_speed = 115200
monitor_speed = 115200

; Libraries for IoT Fall Detection
lib_deps = 
    electroniccats/MPU6050@^1.3.0
    bblanchon/ArduinoJson@^7.0.0

; Extra reset settings to help with upload
upload_resetmethod = nodemcu

; Additional upload reliability settings
; Try slower speed if upload fails (uncomment if needed)
; upload_speed = 57600

; Add extra time before reset
extra_scripts = 
board_build.flash_mode = dio
board_build.f_flash = 40000000L
